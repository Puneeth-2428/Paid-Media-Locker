

services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
      - "4568:4568"
    environment:
      - PORT=4000
      - MONGO_URI=mongodb://mongo:27017/paid-media-locker
      - JWT_SECRET=supersecretjwtkey_replace_in_prod
      - STARTING_WALLET_BALANCE=100
    depends_on:
      - mongo
    volumes:
      - ./backend/storage:/usr/src/app/storage

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
